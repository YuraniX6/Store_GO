spring.application.name=StoreGo

server.port=9011

spring.datasource.url=jdbc:mysql://localhost:3307/skinsarmas
spring.datasource.username=4rpuc
spring.datasource.password=counterstrike26
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA: desactivar creación automática de tablas
spring.jpa.hibernate.ddl-auto=none

# Dialecto recomendado para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway: habilitar migraciones
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90
