spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/storego_auth
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/